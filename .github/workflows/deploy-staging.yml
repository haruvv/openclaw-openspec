name: Deploy Staging

on:
  workflow_dispatch:

concurrency:
  group: revenue-agent-platform-staging
  cancel-in-progress: true

jobs:
  deploy:
    name: Test and deploy staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: bbcaddbc9938b5f98b25475a69589baf
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Deploy staging
        run: npm run deploy:cloudflare -- --name revenue-agent-platform-staging
