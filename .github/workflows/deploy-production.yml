name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: revenue-agent-platform-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Test and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: bbcaddbc9938b5f98b25475a69589baf
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply revenue-agent-platform-operational --remote

      - name: Deploy to Cloudflare
        run: npm run deploy:cloudflare

      - name: Smoke test production
        run: npm run smoke:production
        env:
          PRODUCTION_BASE_URL: https://revenue-agent-platform.haruki-ito0044.workers.dev
          SMOKE_TIMEOUT_MS: 600000
